services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ${CLAUDE_CONFIG_DIR:-${HOME}/.claude}:/home/worker/.claude-mount:ro
      - ${HORTATOR_SSH_PUBKEY:-${HOME}/.ssh/id_ed25519.pub}:/home/worker/.ssh/mounted_authorized_keys:ro
      - /run/host-services/ssh-auth.sock:/ssh-agent
      - worker-workspaces:/home/worker/workspaces
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - GH_TOKEN=${GH_TOKEN:-}
    ports:
      - "22"

volumes:
  worker-workspaces:
